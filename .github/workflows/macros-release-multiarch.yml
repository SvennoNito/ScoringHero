name: Builds for MacOS on Release

permissions:
  contents: write

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: macos-14
    strategy:
      matrix:
        arch: [arm64, x86_64]  # Define architectures

    steps:
    - name: Install Python
      run: brew install python@3.13

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set environment variables
      run: |
        ARCH=${{ matrix.arch }}
        echo "VENV_PATH=.venv_${ARCH}" >> $GITHUB_ENV
        echo "FINAL_FILE_NAME=scoringhero_${ARCH}" >> $GITHUB_ENV
        echo "ASSET_NAME=scoringhero_mac_${ARCH}" >> $GITHUB_ENV

    - name: Build virtual environment
      run: python -m venv ${{ env.VENV_PATH }}

    - name: Debug Python environment
      run: |
        source ${{ env.VENV_PATH }}/bin/activate
        python --version
        python -c "import sysconfig; print(sysconfig.get_platform())"
        pip debug --verbose

    - name: Install Python requirements
      run: |
        source ${{ env.VENV_PATH }}/bin/activate
        python3 -c "
raw = open('requirements.txt', 'rb').read()
text = raw.decode('utf-16') if raw[:2] in (b'\xff\xfe', b'\xfe\xff') else raw.decode('utf-8')
lines = text.splitlines(keepends=True)
filtered = [l for l in lines if 'pyinstaller' not in l and 'pywin32' not in l]
open('/tmp/mac_requirements.txt', 'w').write(''.join(filtered))
print('Filtered requirements written. Lines kept:', len(filtered))
"
        arch -${{ matrix.arch }} pip install -r /tmp/mac_requirements.txt
        arch -${{ matrix.arch }} pip install pyinstaller==6.19.0 pyinstaller-hooks-contrib==2025.3

    - name: Build binary
      run: |
        source ${{ env.VENV_PATH }}/bin/activate
        export VENV_PATH=${{ env.VENV_PATH }}
        export TARGET_ARCH=${{ matrix.arch }}
        export FINAL_FILE_NAME=${{ env.FINAL_FILE_NAME }}
        arch -${{ matrix.arch }} ./release-mac.sh

    - name: Upload macOS binary to release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: dist/${{ env.FINAL_FILE_NAME }}
        asset_name: ${{ env.ASSET_NAME }}
        asset_content_type: application/octet-stream
